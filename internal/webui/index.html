<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trojan-Go 管理面板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f172a; color: #f8fafc; font-family: 'Inter', system-ui, sans-serif; }
        .glass { background: rgba(255,255,255,0.04); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); }
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner { width: 40px; height: 40px; border: 3px solid #334155; border-top-color: #818cf8; border-radius: 50%; animation: spin 0.8s linear infinite; }
    </style>
</head>
<body class="min-h-screen">

<div id="app"></div>

<script>
const API = '/api';
let token = localStorage.getItem('token');

// ─── Hash 路由引擎 ───────────────────────────────────
const routes = {
    '/login': renderLogin,
    '/status': renderStatus,
    '/user': renderUser,
};

function navigate(hash) {
    location.hash = '#' + hash;
}

function router() {
    const hash = location.hash.slice(1) || '/login';
    if (hash !== '/login' && !token) { navigate('/login'); return; }
    const render = routes[hash] || routes['/status'];
    document.getElementById('app').innerHTML = '';
    render();
}

window.addEventListener('hashchange', router);

// ─── API 封装 ────────────────────────────────────────
async function api(method, path, body) {
    const opts = { method, headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' } };
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch(API + path, opts);
    if (res.status === 401) { token = null; localStorage.removeItem('token'); navigate('/login'); return null; }
    return res.json();
}

// ─── 通用布局 ────────────────────────────────────────
function layout(title, content) {
    const app = document.getElementById('app');
    app.innerHTML = `
    <nav class="p-4 border-b border-slate-700/50 glass flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-6">
            <h1 class="text-xl font-bold text-indigo-400 cursor-pointer" onclick="navigate('/status')">Trojan-Go</h1>
            <a href="#/status" class="text-sm text-slate-400 hover:text-white transition">概览</a>
            <a href="#/user" class="text-sm text-slate-400 hover:text-white transition">用户管理</a>
        </div>
        <div class="flex items-center gap-4">
            <span class="text-xs text-slate-500">${title}</span>
            <button onclick="doRestart()" class="text-xs px-3 py-1 rounded bg-amber-700/30 text-amber-300 hover:bg-amber-700/50 transition">重启服务</button>
            <button onclick="logout()" class="text-xs px-3 py-1 rounded bg-slate-700 hover:bg-slate-600 transition">退出</button>
        </div>
    </nav>
    <main class="p-6 max-w-6xl mx-auto fade-in">${content}</main>`;
}

function logout() { token = null; localStorage.removeItem('token'); navigate('/login'); }

// ─── 页面：登录 ──────────────────────────────────────
function renderLogin() {
    const app = document.getElementById('app');
    app.innerHTML = `
    <div class="min-h-screen flex items-center justify-center">
        <div class="glass rounded-2xl p-8 w-full max-w-sm fade-in">
            <h2 class="text-2xl font-bold text-center mb-2 text-indigo-400">Trojan-Go</h2>
            <p class="text-center text-slate-500 text-sm mb-6">管理面板登录</p>
            <input id="pwd" type="password" placeholder="请输入管理密码"
                class="w-full p-3 rounded-lg bg-slate-800 border border-slate-700 text-white mb-4 focus:outline-none focus:border-indigo-500 transition"
                onkeydown="if(event.key==='Enter')doLogin()">
            <button onclick="doLogin()" class="w-full p-3 rounded-lg bg-indigo-600 hover:bg-indigo-500 font-semibold transition">登 录</button>
            <p id="loginErr" class="text-red-400 text-sm mt-3 text-center hidden"></p>
        </div>
    </div>`;
    document.getElementById('pwd').focus();
}

async function doLogin() {
    const pwd = document.getElementById('pwd').value;
    const res = await fetch(API + '/login', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pwd })
    });
    const data = await res.json();
    if (data.token) {
        token = data.token;
        localStorage.setItem('token', token);
        navigate('/status');
    } else {
        const el = document.getElementById('loginErr');
        el.textContent = '密码错误'; el.classList.remove('hidden');
    }
}

// ─── 页面：状态概览 ──────────────────────────────────
async function renderStatus() {
    layout('系统概览', '<div class="grid grid-cols-1 md:grid-cols-3 gap-6" id="cards">加载中...</div>');
    const data = await api('GET', '/status');
    if (!data) return;
    document.getElementById('cards').innerHTML = `
        <div class="p-6 rounded-xl glass"><p class="text-slate-400 text-sm">用户总数</p><h3 class="text-3xl font-bold mt-2">${data.user_count}</h3></div>
        <div class="p-6 rounded-xl glass"><p class="text-slate-400 text-sm">服务状态</p><h3 class="text-3xl font-bold mt-2 text-green-400">运行中</h3></div>
        <div class="p-6 rounded-xl glass"><p class="text-slate-400 text-sm">管理面板</p><h3 class="text-lg font-bold mt-2 text-indigo-400">443 端口复用</h3></div>`;
}

// ─── 页面：用户管理 ──────────────────────────────────
async function renderUser() {
    layout('用户管理', `
    <div class="flex justify-between items-center mb-6">
        <h2 class="text-lg font-semibold">用户列表</h2>
        <button onclick="showAddUser()" class="px-4 py-2 bg-indigo-600 hover:bg-indigo-500 rounded-lg text-sm transition">+ 添加用户</button>
    </div>
    <div id="addUserForm" class="hidden glass rounded-xl p-4 mb-6">
        <div class="flex gap-4 items-end">
            <div class="flex-1"><label class="text-xs text-slate-400 block mb-1">密码</label>
                <input id="newPwd" class="w-full p-2 rounded bg-slate-800 border border-slate-700 text-white text-sm focus:outline-none focus:border-indigo-500"></div>
            <button onclick="addUser()" class="px-4 py-2 bg-green-600 hover:bg-green-500 rounded-lg text-sm transition">确认添加</button>
            <button onclick="document.getElementById('addUserForm').classList.add('hidden')" class="px-4 py-2 bg-slate-700 rounded-lg text-sm transition">取消</button>
        </div>
    </div>
    <div class="glass rounded-xl overflow-hidden">
        <table class="w-full text-left">
            <thead class="bg-slate-800/50 text-slate-400 uppercase text-xs">
                <tr><th class="p-4">ID</th><th class="p-4">密码</th><th class="p-4">已用流量</th><th class="p-4">状态</th><th class="p-4">操作</th></tr>
            </thead>
            <tbody id="userList"><tr><td class="p-4" colspan="5">加载中...</td></tr></tbody>
        </table>
    </div>`);
    const users = await api('GET', '/users');
    if (!users) return;
    const tbody = document.getElementById('userList');
    if (users.length === 0) {
        tbody.innerHTML = '<tr><td class="p-4 text-slate-500" colspan="5">暂无用户，点击右上角添加。</td></tr>';
        return;
    }
    tbody.innerHTML = users.map(u => `
        <tr class="border-t border-slate-800 hover:bg-slate-800/30 transition">
            <td class="p-4 text-slate-500">${u.ID}</td>
            <td class="p-4 font-mono text-indigo-300">${u.password || '-'}</td>
            <td class="p-4">${(u.used / 1024 / 1024).toFixed(2)} MB</td>
            <td class="p-4"><span class="px-2 py-1 ${u.status === 0 ? 'bg-green-900/50 text-green-300' : 'bg-red-900/50 text-red-300'} rounded text-xs">${u.status === 0 ? '正常' : '禁用'}</span></td>
            <td class="p-4"><button onclick="delUser(${u.ID})" class="text-xs text-red-400 hover:text-red-300 transition">删除</button></td>
        </tr>`).join('');
}

function showAddUser() { document.getElementById('addUserForm').classList.remove('hidden'); document.getElementById('newPwd').focus(); }

async function addUser() {
    const pwd = document.getElementById('newPwd').value;
    if (!pwd) return;
    await api('POST', '/users', { password: pwd });
    renderUser();
}

async function delUser(id) {
    if (!confirm('确认删除该用户？')) return;
    await api('DELETE', '/users/' + id);
    renderUser();
}

// ─── 重启与自动重连 ──────────────────────────────────
async function doRestart() {
    if (!confirm('确认重启 trojan-go 服务？页面将自动重连。')) return;
    // 发送重启指令（服务端会调用 systemctl restart）
    try { await api('POST', '/restart'); } catch(e) {}

    // 进入重连等待
    const app = document.getElementById('app');
    app.innerHTML = `
    <div class="min-h-screen flex flex-col items-center justify-center gap-4">
        <div class="spinner"></div>
        <p class="text-slate-400">正在重启服务，请稍候...</p>
        <p class="text-slate-600 text-xs" id="reconnTimer">0s</p>
    </div>`;

    let elapsed = 0;
    const poll = setInterval(async () => {
        elapsed++;
        const el = document.getElementById('reconnTimer');
        if (el) el.textContent = elapsed + 's';
        try {
            const res = await fetch(API + '/status', { headers: { 'Authorization': 'Bearer ' + token } });
            if (res.ok) { clearInterval(poll); navigate('/status'); }
        } catch(e) {}
    }, 1000);
}

// ─── 启动 ────────────────────────────────────────────
if (!location.hash) location.hash = '#/login';
router();
</script>
</body>
</html>
