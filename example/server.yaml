# =================================================================
# Trojan-Go 生产级服务端配置示例
# =================================================================
# 建议部署路径: /etc/trojan-go/server.yaml

# 运行模式：server 表示作为服务端运行，处理来自客户端的代理请求
run_type: server

# 监听地址：0.0.0.0 表示监听本地所有可用的网络接口
local_addr: 0.0.0.0

# 监听端口：主服务端口，通常处理标准的 HTTPS (TLS) 流量
local_port: 443

# =================================================================
# [TLS / SSL 证书配置]
# =================================================================
ssl:
  # 证书文件路径 (必须包含完整的证书链，通常是 .crt 或 .pem)
  cert: /etc/trojan-go/tls/your_domain.com/your_domain.com.crt
  
  # 证书私钥路径 (通常是 .key 或 .pem)
  key: /etc/trojan-go/tls/your_domain.com/your_domain.com.key
  
  # 预设的 SNI 域名 (Server Name Indication，用于与客户端握手匹配)
  sni: your_domain.com         
  
  # 客户端证书校验：设为 false 以大幅提高普通浏览器直接访问该端口时的兼容性
  verify: false             
  
  # 主机名严格校验：设为 false 以解决部分客户端 SNI 偶尔不匹配导致的协议报错中断
  verify_hostname: false    

  # [Web 伪装与回落机制]：防主动探测
  # 核心原理：当 443 端口检测到非 Trojan 流量（例如审查探测或浏览器普通的 HTTPS 访问）时，
  # 会将流量无缝转发给本机的 fallback_addr:fallback_port (这里是本机 80 端口)，
  # 使得外部无论如何试探，看起来都仅仅是一个正常的 Web 网站服务。
  fallback_addr: 127.0.0.1
  fallback_port: 80
  
  # 备选首页兜底：当回落目标 (80端口服务) 发生异常或未启动时，
  # 直接读取并返回该 HTML 文件的内容，充当最后的网页防线。
  plain_http_response: /etc/trojan-go/index.html

# =================================================================
# [多路复用配置 (Mux)]
# =================================================================
# 开启多路复用可以显著降低底层 TCP 连接并发握手的开销，
# 尤其是能够大幅提升加载含有大量碎文件、小图片的网页时的速度。
mux:                
  enabled: true

# =================================================================
# [WebSocket 配置 (CDN 隐藏IP与救砖)]
# =================================================================
# 开启 Websocket 支持，允许将 Trojan 流量伪装并包裹在 HTTP/WebSocket 协议中。
# 这是搭配 Cloudflare 等 CDN 隐藏真实服务器 IP、应对特殊网络封锁的关键核心配置。
websocket:
  enabled: true
  
  # WebSocket 握手路径
  # 【安全警告】千万不要使用 /ws、/trojan、/proxy 等毫无防备的常见高频探测词汇！
  # 务必使用看起来像普通 API 接口的无规律/随机字符串，防止被防火墙主动特征嗅探。
  path: "/stream-v2-d8x9"
  
  # WebSocket 请求 Host 伪装头，必须和上面的 SNI 域名保持完全一致
  host: "your_domain.com"

# =================================================================
# [内置 Web 运维管理面板]
# =================================================================
# Trojan-Go 拥有强大的内置用户管理与数据可视化后台。开启后可直接通过 443 端口复用访问。
admin:
  enabled: true
  # 面板登录账号
  username: "admin"
  # 面板登录密码 (部署时请务必修改为不规律的强密码)
  password: "trojan@123"
  
  # 独立监听端口：设为 0 表示不额外开启额外的 HTTP 端口，仅依赖上方 443 的内部复用访问即可
  port: 0
  
  # SQLite 本地数据库文件路径 (自动持久化保存你的用户账号、流量统计信息及面板系统设置)
  db: /etc/trojan-go/trojan-go.db
  
  # Web 面板的挂载 URL 访问路径 (例如在浏览器访问 https://your_domain.com/admin 即可进入后台)
  path: /admin

# =================================================================
# [系统运行日志配置]
# =================================================================
log:
  # 日志记录级别: 0-TRACE(最详尽), 1-INFO(常规), 2-WARN(警告), 3-ERROR(仅错误), 4-FATAL
  # 生产环境建议设为 1 或 2，排查故障时可以调到 0。
  level: 1  
  
  # 访问日志文件存放路径 (记录每一次成功连接的详细出入站信息，长期运行文件可能会占用一定空间)
  access: /etc/trojan-go/log/trojan-go/access.log
  
  # 错误日志文件存放路径 (记录系统异常报错、或不明源 IP 的恶意探测，排障必备)
  error: /etc/trojan-go/log/trojan-go/error.log
